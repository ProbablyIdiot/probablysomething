---
title: ⭐ Ratings
contentTitle: Ratings
layout: default
colour: "#b213b9"
customStyle: "/assets/css/ratings.css"
---

<div class="ratingsHolder">
	{% for post in site.musicratings %}
		<a href="{{ post.url }}"><div class="albumItem">
			<img src="{{ post.albumCover }}"  class="albumCover">
			<div class="albumInfo">
				<h1>{{ post.contentTitle }}</h1>
				<p>{{ post.contentYear }}</p>
				<p>{{ post.contentArtist }}</p>
			</div>
		</div></a>
	{% endfor %}
</div>

<script defer src="/assets/js/ratings.js"></script>
